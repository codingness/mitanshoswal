<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mitansh Oswal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Pacifico&family=Orbitron:wght@600&family=Lobster&family=Fredoka:wght@600&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:#0f172a;
    text-align:center;
    padding:20px;
    gap:20px;
}

/* rainbow glow title */

.rainbow{
    font-size:clamp(36px,8vw,70px);
    font-family:Poppins;
    font-weight:bold;
    background:linear-gradient(90deg,red,orange,yellow,green,cyan,blue,violet);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{filter:drop-shadow(0 0 5px white);}
    to{filter:drop-shadow(0 0 20px white);}
}

/* bounce */

.bounce{
    font-size:clamp(26px,6vw,45px);
    font-family:Fredoka;
    color:#00ffcc;
    animation:bounce 1.2s infinite;
}

@keyframes bounce{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-12px)}
}

/* typing */

.typing{
    font-size:clamp(24px,5vw,40px);
    font-family:Orbitron;
    color:#ffa500;
    border-right:3px solid white;
    white-space:nowrap;
    overflow:hidden;
    width:0;
    animation:typing 4s steps(20,end) forwards;
}

@keyframes typing{
    from{width:0}
    to{width:260px}
}

/* script font */

.script{
    font-size:clamp(30px,7vw,50px);
    font-family:Pacifico;
    color:#ff66cc;
}

/* neon */

.neon{
    font-size:clamp(26px,6vw,45px);
    font-family:Lobster;
    color:#66ff66;
    text-shadow:
        0 0 5px #66ff66,
        0 0 10px #66ff66,
        0 0 20px #66ff66;
}

/* mobile spacing */

@media (max-width:600px){

body{
gap:25px;
}

.typing{
animation:typingMobile 4s steps(20,end) forwards;
}

@keyframes typingMobile{
from{width:0}
to{width:200px}
}

}

</style>
</head>

<body>

<div class="rainbow">Mitansh Oswal</div>

<div class="bounce">Mitansh Oswal</div>

<div class="typing">Mitansh Oswal</div>

<div class="script">Mitansh Oswal</div>

<div class="neon">Mitansh Oswal</div>

</body>
</html>
